<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投資操作</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #0b0e11;
            --surface: #141820;
            --surface-2: #1a1f2e;
            --border: rgba(255,255,255,0.06);
            --text: #eaf0f6;
            --text-dim: #6b7a8d;
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.15);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.12);
            --amber: #f59e0b;
            --input-bg: #1a1f2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 16px; padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(80px, env(safe-area-inset-bottom));
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 0; }

        .card {
            background: var(--surface); padding: 18px; margin-bottom: 14px; border-radius: 16px;
            border: 1px solid var(--border);
        }

        select, input[type="text"], input[type="number"] {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--input-bg); font-size: 16px; margin-bottom: 8px; box-sizing: border-box;
            outline: none; -webkit-appearance: none; color: var(--text); font-family: inherit;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-box {
            background: var(--surface-2); padding: 14px; border-radius: 12px; text-align: center;
            border: 1px solid var(--border);
        }
        .info-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-val { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .info-val-accent { color: var(--accent); }

        button {
            flex: 1; padding: 12px; border: none; font-weight: 600; color: white; border-radius: 12px;
            font-size: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .btn-buy { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .btn-sell { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-action { background: linear-gradient(135deg, #3b82f6, #2563eb); width: 100%; }
        .btn-disabled { background: var(--surface-2); color: var(--text-dim); pointer-events: none; border: 1px solid var(--border); }

        .tag {
            font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; vertical-align: middle; margin-left: 6px;
        }
        .tag-stock { background: rgba(99,102,241,0.15); color: #818cf8; }
        .tag-gold { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .tag-bond { background: rgba(34,197,94,0.15); color: #4ade80; }

        .text-up { color: var(--green); } .text-down { color: var(--red); }
        .price-change { font-size: 12px; font-weight: 600; }

        .deposit-item {
            border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .deposit-item:last-child { border-bottom: none; }

        .section-title {
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-dim); margin: 20px 0 10px 4px;
        }

        .holding-bar {
            background: var(--surface-2); padding: 8px 12px; border-radius: 8px; font-size: 13px;
            margin: 12px 0; color: var(--text-dim); border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .holding-bar strong { color: var(--text); }

        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
        .trade-col select { margin: 0; font-size: 14px; }

        .bond-info {
            font-size: 11px; color: var(--green); background: var(--green-dim);
            padding: 3px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; font-weight: 600;
        }

        #news-modal, #end-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(16px); z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        .modal-card {
            background: var(--surface); width: 88%; max-width: 400px; padding: 28px;
            border-radius: 20px; text-align: center; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .modal-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .modal-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal-card p { font-size: 15px; color: var(--text-dim); line-height: 1.5; }

        #toast {
            position: fixed; bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            background: var(--surface); color: var(--text); padding: 12px 24px; border-radius: 50px;
            display: none; z-index: 100; font-size: 14px; font-weight: 600;
            border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #login-screen .card {
            background: var(--surface); border: 1px solid var(--border);
        }
        #login-screen h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        #login-screen .login-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }
        #login-screen input { text-align: center; font-size: 17px; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header-row h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .player-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
        .player-meta a { color: var(--accent); cursor: pointer; text-decoration: none; }
        .round-pill {
            background: var(--accent-glow); color: var(--accent); font-size: 12px; font-weight: 600;
            padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(59,130,246,0.2);
            white-space: nowrap;
        }

        .deposit-form {
            background: var(--surface-2); padding: 14px; border-radius: 12px; margin-bottom: 14px;
            border: 1px solid var(--border);
        }
        .deposit-form .row { display: flex; gap: 8px; }
        .deposit-form input, .deposit-form select { margin: 0; background: var(--bg); border: 1px solid var(--border); font-size: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
    <div id="news-modal">
        <div class="modal-card">
            <div style="font-size: 40px; margin-bottom: 12px;">📢</div>
            <h2 id="modal-title">快訊</h2>
            <p id="modal-desc">...</p>
            <button class="btn-action" onclick="document.getElementById('news-modal').style.display='none'" style="margin-top:16px;">我知道了</button>
        </div>
    </div>
    <div id="end-screen">
        <div class="modal-card">
            <div style="font-size: 48px; margin-bottom: 8px;">&#127942;</div>
            <h1>遊戲結束</h1>
            <p style="margin-bottom: 16px;">最終結算</p>
            <div id="final-assets" style="font-size: 40px; font-weight: 800; color: var(--accent); margin-bottom: 20px; letter-spacing: -1px;">$0</div>
            <div id="final-breakdown" style="text-align: left; background: var(--surface-2); padding: 16px; border-radius: 12px; font-size: 14px; border: 1px solid var(--border);"></div>
        </div>
    </div>

    <div id="login-screen" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px;">
        <div class="card" style="text-align: center; padding: 44px 24px;">
            <div style="font-size: 44px; margin-bottom: 12px;">&#128200;</div>
            <h2>股市大亨</h2>
            <div class="login-sub">模擬投資，贏取利潤</div>
            <input type="text" id="username" placeholder="輸入姓名 / 組別">
            <button class="btn-action" style="margin-top: 8px;" onclick="attemptJoin()">進入市場</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="header-row">
            <div>
                <h1>我的資產</h1>
                <div class="player-meta">
                    <span id="player-name-display"></span> &middot; <a onclick="logout()">登出</a>
                </div>
            </div>
            <span id="round-display" class="round-pill">載入中...</span>
        </div>

        <div class="card" style="padding: 14px 18px;">
            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">現金</div>
                    <div class="info-val" id="p-cash">$0</div>
                </div>
                <div class="info-box">
                    <div class="info-label">總資產</div>
                    <div class="info-val info-val-accent" id="p-total">$0</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom: 4px;">
                <span style="font-size:18px;">&#127974;</span>
                <h3 style="font-size: 17px; font-weight: 700;">定期存款</h3>
            </div>
            <div style="font-size:12px; color:var(--text-dim); margin-bottom:14px;">資金鎖定，到期自動入帳</div>
            <div class="deposit-form">
                <div class="row">
                    <input type="number" id="deposit-amount" placeholder="金額" style="flex:1;">
                    <select id="deposit-duration" style="flex:1.2;">
                        <option value="3">3個月 (0.125%)</option>
                        <option value="6">6個月 (0.125%)</option>
                        <option value="9">9個月 (0.150%)</option>
                        <option value="12">12個月 (0.150%)</option>
                    </select>
                </div>
                <button class="btn-buy" style="width:100%; margin-top: 8px;" onclick="createDeposit()">立即存入</button>
            </div>
            <div id="deposit-list"></div>
        </div>

        <div class="section-title">市場報價</div>
        <div id="market-list"></div>
    </div>
    <div id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myData = null, currentMarket = null, currentRound = 0;

        function getUserId() {
            let uid = localStorage.getItem('stockGameUID');
            if (!uid) {
                uid = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                localStorage.setItem('stockGameUID', uid);
            }
            return uid;
        }

        window.onload = function() {
            const savedName = localStorage.getItem('stockGameUser');
            if (savedName) {
                document.getElementById('username').value = savedName;
                attemptJoin(true);
            }
        };

        function attemptJoin(isAuto = false) {
            const nameInput = document.getElementById('username');
            const name = nameInput.value.trim();
            const uid = getUserId();
            if(name) {
                if(!isAuto) localStorage.setItem('stockGameUser', name);
                socket.emit('join_game', 'player', { name: name, userId: uid });
            }
        }

        function logout() {
            if(confirm("確定要登出並清除紀錄嗎？")) {
                localStorage.removeItem('stockGameUser');
                window.location.reload();
            }
        }

        socket.on('login_failed', (msg) => {
            alert(msg);
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            localStorage.removeItem('stockGameUser');
        });

        socket.on('init_player', data => {
            if(data.reload) window.location.reload();
            currentRound = data.round;
            document.getElementById('player-name-display').innerText = data.player.name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            updateAll(data);
            if(data.lastEvent) showNews(data.lastEvent);
        });

        socket.on('update_player', data => { updateAll({ player: data.player, market: currentMarket }); if(data.msg) showToast(data.msg); });
        socket.on('error_msg', msg => showToast(msg));

        socket.on('new_round', data => {
            currentMarket = data.market;
            currentRound = data.round;
            document.getElementById('round-display').innerText = `Round ${data.round} (${data.round*3}m)`;
            renderMarket();
            if(myData) renderDeposits(myData.deposits);
            if(data.event) showNews(data.event);
        });

        socket.on('game_over', data => {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('news-modal').style.display = 'none';
            let me = data.players[socket.id] || myData;
            let stockVal = 0;
            for(let code in me.portfolio) if(data.market[code]) stockVal += me.portfolio[code] * data.market[code].price;
            let depositTotal = 0;
            if(me.deposits) me.deposits.forEach(d => depositTotal += d.amount);
            let total = me.cash + depositTotal + stockVal;
            document.getElementById('final-assets').innerText = '$' + Math.floor(total).toLocaleString();
            document.getElementById('final-breakdown').innerHTML =
                `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text);"><span style="color:var(--text-dim);">現金</span> <span style="font-weight:600;">$${Math.floor(me.cash).toLocaleString()}</span></div>` +
                `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text);"><span style="color:var(--text-dim);">定存</span> <span style="font-weight:600;">$${Math.floor(depositTotal).toLocaleString()}</span></div>` +
                `<div style="display:flex; justify-content:space-between; color:var(--text);"><span style="color:var(--text-dim);">證券</span> <span style="font-weight:600;">$${Math.floor(stockVal).toLocaleString()}</span></div>`;
            document.getElementById('end-screen').style.display = 'flex';
        });

        function showNews(event) {
            document.getElementById('modal-title').innerText = event.title;
            document.getElementById('modal-desc').innerText = event.desc;
            document.getElementById('news-modal').style.display = 'flex';
        }

        function updateAll(data) {
            myData = data.player;
            if(data.market) currentMarket = data.market;
            if(data.round !== undefined) currentRound = data.round;
            document.getElementById('round-display').innerText = `Round ${currentRound} (${currentRound*3}m)`;
            let stockVal = 0;
            if(currentMarket) { for(let code in myData.portfolio) stockVal += myData.portfolio[code] * currentMarket[code].price; }
            let depositTotal = 0;
            if(myData.deposits) myData.deposits.forEach(d => depositTotal += d.amount);
            let total = myData.cash + depositTotal + stockVal;
            document.getElementById('p-cash').innerText = '$' + Math.floor(myData.cash).toLocaleString();
            document.getElementById('p-total').innerText = '$' + Math.floor(total).toLocaleString();
            renderDeposits(myData.deposits);
            renderMarket();
        }

        function renderDeposits(deposits) {
            const list = document.getElementById('deposit-list');
            if(!deposits || deposits.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-dim); font-size:13px; padding:12px;">目前沒有定存</div>';
                return;
            }
            list.innerHTML = deposits.map(d => {
                let roundsLeft = d.maturityRound - currentRound;
                let statusColor = roundsLeft <= 0 ? 'var(--green)' : 'var(--amber)';
                let statusBg = roundsLeft <= 0 ? 'var(--green-dim)' : 'rgba(245,158,11,0.1)';
                return `<div class="deposit-item">
                    <div>
                        <div style="font-weight:700; color:var(--text);">$${d.amount.toLocaleString()}</div>
                        <div style="font-size:12px; color:var(--text-dim);">${d.duration}個月期</div>
                    </div>
                    <div style="font-size:12px; font-weight:600; color:${statusColor}; background:${statusBg}; padding:4px 10px; border-radius:6px;">
                        ${roundsLeft <= 0 ? "結算中..." : `&#128274; 剩 ${roundsLeft} 回合`}
                    </div>
                </div>`;
            }).join('');
        }

        function renderMarket() {
            if (!currentMarket) return;
            const list = document.getElementById('market-list');
            list.innerHTML = Object.keys(currentMarket).map(code => {
                const item = currentMarket[code];
                const holdingQty = myData.portfolio[code] || 0;
                const lotsHeld = Math.floor(holdingQty / item.lotSize);
                let costPerLot = item.price * item.lotSize;
                let feeMultiplier = item.type === 'stock' ? 1.004 : 1;
                let maxBuy = Math.floor(myData.cash / (costPerLot * feeMultiplier));
                if(item.type === 'bond' && (costPerLot < item.minEntry)) { let minLots = Math.ceil(item.minEntry / costPerLot); if (maxBuy < minLots) maxBuy = 0; }
                let unitName = item.type === 'gold' ? '兩' : '手';
                let shareUnit = item.type === 'gold' ? '兩' : (item.type === 'bond' ? '單位' : '股');
                let buyOptions = maxBuy === 0 ? `<option value="0">餘額不足</option>` : "";
                if (maxBuy > 0) { let limit = Math.min(maxBuy, 100); for(let i=1; i<=limit; i++) buyOptions += `<option value="${i}">${i} ${unitName} ($${Math.floor(i*costPerLot).toLocaleString()})</option>`; }
                let sellOptions = lotsHeld === 0 ? `<option value="0">無持倉</option>` : "";
                if (lotsHeld > 0) { let limit = Math.min(lotsHeld, 100); for(let i=1; i<=limit; i++) sellOptions += `<option value="${i}">${i} ${unitName}</option>`; }
                let change = item.change || 0; let pct = item.changePercent || 0;
                let colorClass = change >= 0 ? "text-up" : "text-down";
                let arrow = change > 0 ? "&#9650; " : (change < 0 ? "&#9660; " : "");
                let changeDisplay = change !== 0 ? `<span class="price-change ${colorClass}">${arrow}${Math.abs(change).toFixed(2)} (${change>=0?"+":""}${pct.toFixed(1)}%)</span>` : `<span class="price-change" style="color:var(--text-dim);">—</span>`;
                let tagType = item.type === 'gold' ? 'gold' : (item.type === 'bond' ? 'bond' : 'stock');
                let tagName = item.type === 'gold' ? '黃金' : (item.type === 'bond' ? '債券' : '股票');
                let extraInfo = item.type === 'bond' ? `<br><span class="bond-info">年息 ${item.coupon}%</span>` : '';
                return `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-weight:700; font-size:16px;">${item.name}<span class="tag tag-${tagType}">${tagName}</span></div>
                            <div style="color:var(--text-dim); font-size:13px; margin-top:2px;">${code}${extraInfo}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:18px; font-weight:800; letter-spacing:-0.3px;">$${item.price.toFixed(2)}</div>
                            ${changeDisplay}
                        </div>
                    </div>
                    <div class="holding-bar">
                        <span>持有</span>
                        <span><strong>${holdingQty} ${shareUnit}</strong> (${lotsHeld} ${unitName})</span>
                    </div>
                    <div class="trade-grid">
                        <div class="trade-col">
                            <select id="buy-select-${code}">${buyOptions}</select>
                            <button class="${maxBuy > 0 ? 'btn-buy' : 'btn-disabled'}" style="width:100%; margin-top:4px;" onclick="trade('buy', '${code}')">買入</button>
                        </div>
                        <div class="trade-col">
                            <select id="sell-select-${code}">${sellOptions}</select>
                            <button class="${lotsHeld > 0 ? 'btn-sell' : 'btn-disabled'}" style="width:100%; margin-top:4px;" onclick="trade('sell', '${code}')">賣出</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function trade(action, code) {
            const selectId = action === 'buy' ? `buy-select-${code}` : `sell-select-${code}`;
            const val = document.getElementById(selectId).value;
            if(val === "0" || !val) return;
            socket.emit('trade', action, code, parseInt(val));
        }
        function createDeposit() {
            const amt = document.getElementById('deposit-amount').value;
            const dur = document.getElementById('deposit-duration').value;
            if(!amt || amt <= 0) return showToast("請輸入有效金額");
            socket.emit('create_deposit', amt, dur);
            document.getElementById('deposit-amount').value = '';
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
